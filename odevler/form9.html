<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECC006 Homework 9 - Music Survey</title>
    <style>
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #f8f9fa;
            color: #212529;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 26px;
            font-weight: 600;
            color: #1a1d20;
            margin-bottom: 24px;
        }

        /* Modern Form Container */
        form {
            width: 100%;
            max-width: 600px;
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            border: 1px solid #e9ecef;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
            color: #1a1d20;
        }

        /* Input Styles */
        input[type="text"],
        input[type="email"],
        textarea,
        select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            font-size: 14px;
            color: #495057;
            background-color: #ffffff;
            box-sizing: border-box;
            font-family: inherit;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        textarea:focus,
        select:focus {
            border-color: #1a1d20;
            outline: none;
        }

        /* Fieldset & Legend Styling */
        fieldset {
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 15px 20px;
            margin-bottom: 20px;
        }

        legend {
            font-weight: 600;
            font-size: 14px;
            color: #1a1d20;
            padding: 0 10px;
        }

        .checkbox-group, .radio-group {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            font-size: 14px;
            color: #495057;
        }

        .checkbox-group input, .radio-group input {
            margin-right: 10px;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        /* Select element with specific height */
        select[multiple] {
            height: auto;
        }

        /* Buttons Layout */
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 25px;
        }

        button, input[type="submit"], input[type="reset"] {
            flex: 1;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            border: none;
            text-align: center;
        }

        input[type="submit"] {
            background-color: #1a1d20;
            color: #ffffff;
        }

        input[type="submit"]:hover {
            background-color: #495057;
        }

        input[type="reset"] {
            background-color: #e9ecef;
            color: #495057;
        }

        input[type="reset"]:hover {
            background-color: #dee2e6;
        }
    </style>
</head>
<body>

    <h1>Music Survey</h1>

    <form action="http://www.uyar.com/teaching/ecc006/2017spring/login.php" method="post">
        
        <div class="form-group">
            <label for="name">Name:</label>
            <input type="text" id="name" name="myName" required>
        </div>

        <div class="form-group">
            <label for="email">E-Mail:</label>
            <input type="email" id="email" name="myEmail" required>
        </div>

        <fieldset>
            <legend>Select Your Favorite Types of Music:</legend>
            <div class="checkbox-group">
                <input type="checkbox" id="pop" name="musicType[]" value="Pop">
                <label for="pop" style="font-weight: normal; margin: 0;">Pop</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="classical" name="musicType[]" value="Classical">
                <label for="classical" style="font-weight: normal; margin: 0;">Classical</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="rock" name="musicType[]" value="Rock">
                <label for="rock" style="font-weight: normal; margin: 0;">Rock</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="folk" name="musicType[]" value="Folk">
                <label for="folk" style="font-weight: normal; margin: 0;">Folk</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="rap" name="musicType[]" value="Rap">
                <label for="rap" style="font-weight: normal; margin: 0;">Rap</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="other" name="musicType[]" value="Other">
                <label for="other" style="font-weight: normal; margin: 0;">Other</label>
            </div>
        </fieldset>

        <fieldset>
            <legend>Select how often you purchase Music CDs:</legend>
            <div class="radio-group">
                <input type="radio" id="weekly" name="purchaseFrequency" value="Weekly">
                <label for="weekly" style="font-weight: normal; margin: 0;">Weekly</label>
            </div>
            <div class="radio-group">
                <input type="radio" id="monthly" name="purchaseFrequency" value="Monthly">
                <label for="monthly" style="font-weight: normal; margin: 0;">Monthly</label>
            </div>
            <div class="radio-group">
                <input type="radio" id="few-years" name="purchaseFrequency" value="A few CDs each year">
                <label for="few-years" style="font-weight: normal; margin: 0;">A few CDs each year</label>
            </div>
            <div class="radio-group">
                <input type="radio" id="never" name="purchaseFrequency" value="Never purchase">
                <label for="never" style="font-weight: normal; margin: 0;">Never purchase</label>
            </div>
        </fieldset>

        <div class="form-group">
            <label for="location">Select the locations you listen to Music:</label>
            <select id="location" name="listenLocation" size="3">
                <option value="Home">At home</option>
                <option value="Car">In the car</option>
                <option value="Anywhere">Anywhere (MP3 Player)</option>
                <option value="Concerts">At live concerts</option>
            </select>
        </div>

        <div class="form-group">
            <label for="role">What role does music play in your life?</label>
            <textarea id="role" name="musicRole" cols="60" rows="3"></textarea>
        </div>

        <div class="btn-group">
            <input type="submit" value="Submit">
            <input type="reset" value="Reset">
        </div>

    </form>

</body>
</html>
